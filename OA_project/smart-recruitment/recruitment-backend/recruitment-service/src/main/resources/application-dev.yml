# 完整中间件联调配置
# 个人配置（数据库密码、中间件地址等）通过 .env 文件或环境变量注入
# 启动方式: mvn spring-boot:run "-Dspring-boot.run.profiles=dev"
spring:
  # Nacos 配置中心: 暂时禁用（启动 Nacos 后取消注释下行并改 config.enabled=true）
  # config:
  #   import: "optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension:yml}"
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart_recruitment}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  elasticsearch:
    uris: http://${ES_HOST:localhost}:${ES_PORT:9200}
  cloud:
    nacos:
      discovery:
        # 未启动 Nacos 时设为 false，启动后再打开
        enabled: false
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        ip: "${NACOS_DISCOVERY_IP:127.0.0.1}"
        fail-fast: false
      config:
        # 未启动 Nacos 时关闭
        enabled: false
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        file-extension: yml
        import-check:
          enabled: false

# 默认为空时，OpenFeign 通过 Nacos 按服务名发现 AI 服务；设置后可临时直连指定地址。
ai:
  service:
    url: "${AI_SERVICE_URL:}"

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

recruitment:
  security:
    permit-all: false
