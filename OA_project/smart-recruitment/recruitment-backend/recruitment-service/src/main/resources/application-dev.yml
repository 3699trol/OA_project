# 完整中间件联调配置（Nacos 已启动）
# 配置优先级：Nacos > application-dev.yml > application.yml
spring:
  config:
    import:
      - "optional:nacos:recruitment-common.yml?group=${NACOS_CONFIG_GROUP:SMART_RECRUITMENT}&refreshEnabled=false"
      - "optional:nacos:${spring.application.name}.yml?group=${NACOS_CONFIG_GROUP:SMART_RECRUITMENT}&refreshEnabled=false"
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart_recruitment}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:2254696935@qq.com}
    password: ${MAIL_PASSWORD:rmhcuvdxbeobechi}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  elasticsearch:
    uris: http://${ES_HOST:localhost}:${ES_PORT:9200}
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        ip: "${NACOS_DISCOVERY_IP:127.0.0.1}"
        fail-fast: false
      config:
        enabled: true
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        group: "${NACOS_CONFIG_GROUP:SMART_RECRUITMENT}"
        file-extension: yml
        refresh-enabled: false
        fail-fast: false
        import-check:
          enabled: false

# 默认直连本机 AI 服务
ai:
  service:
    url: "${AI_SERVICE_URL:http://127.0.0.1:8081}"

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

recruitment:
  security:
    permit-all: false
  mail:
    from: ${MAIL_FROM:2254696935@qq.com}
    from-name: 智能招聘系统
  auth:
    user-cache-ttl: 30m
    login-failure-window: 10m
    max-login-failures: 5
    password-reset-code-ttl: 10m
    password-reset-cooldown: 60s
    max-password-reset-attempts: 5
