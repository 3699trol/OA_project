server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: recruitment-service
  profiles:
    # 默认本地轻量启动，不依赖 Nacos / MySQL / Redis / ES
    active: local
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false
    openfeign:
      client:
        config:
          recruitment-ai-service:
            connectTimeout: 10000
            readTimeout: 120000

jwt:
  secret: recruitment-system-secret-key-must-be-at-least-256-bits
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

ai:
  service:
    # 非空 URL 时 OpenFeign 直接调用 AI 服务，不经过 Nacos 服务发现。
    url: "${AI_SERVICE_URL:http://127.0.0.1:8081}"

# 文件上传配置
file:
  upload-dir: c:/JavaCode/OA_project/OA_project/smart-recruitment/uploads
  max-size: 10485760

logging:
  level:
    com.recruitment: debug
