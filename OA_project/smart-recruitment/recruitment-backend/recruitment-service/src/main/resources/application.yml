server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: recruitment-service
  profiles:
    # 默认本地轻量启动，不依赖 Nacos / MySQL / Redis / ES
    active: local
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false

jwt:
  secret: recruitment-system-secret-key-must-be-at-least-256-bits
  expiration: 86400000

ai:
  service:
    url: http://localhost:8081

logging:
  level:
    com.recruitment: debug
