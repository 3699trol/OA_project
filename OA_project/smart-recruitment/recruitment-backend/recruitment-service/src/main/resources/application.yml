server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: recruitment-service
  profiles:
    # 默认本地轻量启动，不依赖 Nacos / MySQL / Redis / ES
    active: local
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false
    openfeign:
      client:
        config:
          recruitment-ai-service:
            connectTimeout: 10000
            readTimeout: 120000

jwt:
  secret: recruitment-system-secret-key-must-be-at-least-256-bits
  expiration: 86400000

ai:
  service:
    url: http://localhost:8081

# 文件上传配置
file:
  upload-dir: ./uploads
  max-size: 10485760

logging:
  level:
    com.recruitment: debug
