# dev only keeps the bootstrap settings needed to connect to Nacos.
# Business settings are provided by recruitment-common.yml and recruitment-ai-service.yml.
spring:
  config:
    import:
      - "nacos:recruitment-common.yml?group=${NACOS_CONFIG_GROUP:SMART_RECRUITMENT}&refreshEnabled=true"
      - "nacos:${spring.application.name}.yml?group=${NACOS_CONFIG_GROUP:SMART_RECRUITMENT}&refreshEnabled=true"
  cloud:
    nacos:
      username: "${NACOS_USERNAME:}"
      password: "${NACOS_PASSWORD:}"
      discovery:
        enabled: true
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        ip: "${NACOS_DISCOVERY_IP:}"
        namespace: "${NACOS_NAMESPACE:}"
        group: "${NACOS_DISCOVERY_GROUP:SMART_RECRUITMENT}"
        fail-fast: true
        metadata:
          version: "${SERVICE_VERSION:1.0.0}"
      config:
        enabled: true
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        namespace: "${NACOS_NAMESPACE:}"
        group: "${NACOS_CONFIG_GROUP:SMART_RECRUITMENT}"
        file-extension: yml
        refresh-enabled: true
        import-check:
          enabled: true
