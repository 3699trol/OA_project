# AI 服务 dev 配置 — Nacos 已启动，配置可选
server:
  port: 8081

spring:
  config:
    import:
      - "optional:nacos:recruitment-common.yml?group=${NACOS_CONFIG_GROUP:SMART_RECRUITMENT}&refreshEnabled=false"
      - "optional:nacos:${spring.application.name}.yml?group=${NACOS_CONFIG_GROUP:SMART_RECRUITMENT}&refreshEnabled=false"
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        fail-fast: false
      config:
        enabled: true
        server-addr: "${NACOS_SERVER_ADDR:127.0.0.1:8848}"
        group: "${NACOS_CONFIG_GROUP:SMART_RECRUITMENT}"
        file-extension: yml
        refresh-enabled: false
        fail-fast: false
        import-check:
          enabled: false
