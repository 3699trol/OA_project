# 本地轻量启动：不依赖 Nacos / Redis / 真实大模型
server:
  port: 8081
  servlet:
    context-path: /

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false

jwt:
  secret: ${JWT_SECRET:recruitment-system-secret-key-must-be-at-least-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}

recruitment:
  security:
    permit-all: true
