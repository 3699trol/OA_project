server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: recruitment-ai-service
  profiles:
    active: local
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7

jwt:
  secret: recruitment-system-secret-key-must-be-at-least-256-bits
  expiration: 86400000

logging:
  level:
    com.recruitment.ai: debug
