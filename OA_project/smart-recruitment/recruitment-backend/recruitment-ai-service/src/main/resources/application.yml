server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: recruitment-ai-service
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yml
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7

jwt:
  secret: recruitment-system-secret-key-must-be-at-least-256-bits
  expiration: 86400000

logging:
  level:
    com.recruitment.ai: debug
