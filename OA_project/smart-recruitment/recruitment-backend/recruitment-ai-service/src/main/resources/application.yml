server:
  port: 8081
  servlet:
    context-path: /

spring:
  config:
    import: "optional:file:./application-secrets.properties"
  application:
    name: recruitment-ai-service
  profiles:
    active: local
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false

ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    reasoning-effort: ${OPENAI_REASONING_EFFORT:}
    max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:2500}
    proxy-host: ${OPENAI_PROXY_HOST:}
    proxy-port: ${OPENAI_PROXY_PORT:0}
    connect-timeout-seconds: 10
    read-timeout-seconds: 90

jwt:
  secret: recruitment-system-secret-key-must-be-at-least-256-bits
  expiration: 86400000

logging:
  level:
    com.recruitment.ai: debug
