# 本地中间件一键启动（开发联调推荐）
# 说明：
# 1. 课程要求可安装 Windows 版 ES 7.13 / Redis 2.8.9；
# 2. 本仓库 Docker 使用 Redis Stack + ES 7.17，便于向量检索与全文搜索联调；
# 3. Nacos 使用本机自有实例（nacos/nacos-server:v2.2.3 镜像内置 OpenJDK 在部分 Docker/cgroup v2 环境下初始化 Derby 崩溃，无法修复），端口 8848/9848 由本地 Nacos 占用。

services:
  # 注意：MySQL 使用本机自有实例，端口 3306 已由本地 MySQL 占用，
  # 因此不再通过 Docker 启动。请手动执行 ../sql/init.sql 初始化库。

  # Redis Stack：缓存 + 向量检索
  redis-stack:
    image: ${REDIS_IMAGE:-redis/redis-stack:latest}
    container_name: recruitment-redis-stack
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # Elasticsearch：简历/职位全文检索
  elasticsearch:
    image: ${ES_IMAGE:-elasticsearch:8.18.6}
    container_name: recruitment-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped

  # Nacos：服务注册与配置中心
  nacos:
    image: ${NACOS_IMAGE:-nacos/nacos-server:v2.4.3}
    container_name: recruitment-nacos
    environment:
      - MODE=standalone
      - JVM_XMS=256m
      - JVM_XMX=512m
    ports:
      - "8848:8848"
      - "9848:9848"
    restart: unless-stopped

volumes:
  redis-data:
  es-data: