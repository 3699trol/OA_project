version: '3.8'

# 本地中间件一键启动（开发联调推荐）
# 说明：
# 1. 课程要求可安装 Windows 版 ES 7.13 / Redis 2.8.9；
# 2. 本仓库 Docker 使用 Redis Stack + ES 7.17，便于向量检索与全文搜索联调；
# 3. Nacos 建议使用 2.x（兼容 Spring Cloud Alibaba 2023.0.1）。

services:
  mysql:
    image: mysql:8.0
    container_name: recruitment-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_recruitment
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped

  # Redis Stack：缓存 + 向量检索（替代纯 Redis 2.8.9 做向量能力）
  redis-stack:
    image: redis/redis-stack:latest
    container_name: recruitment-redis-stack
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # Elasticsearch：简历/职位全文检索
  elasticsearch:
    image: elasticsearch:7.17.21
    container_name: recruitment-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: unless-stopped

  # Nacos：服务注册与配置中心
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: recruitment-nacos
    environment:
      - MODE=standalone
      - JVM_XMS=256m
      - JVM_XMX=512m
    ports:
      - "8848:8848"
      - "9848:9848"
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  es-data: