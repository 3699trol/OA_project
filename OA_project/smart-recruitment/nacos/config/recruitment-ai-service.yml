server:
  port: ${RECRUITMENT_AI_SERVICE_PORT:8081}
  servlet:
    context-path: /

recruitment:
  config-center:
    service-loaded: recruitment-ai-service

ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    model: gpt-4o-mini
    reasoning-effort: ${OPENAI_REASONING_EFFORT:}
    max-output-tokens: 2500
    proxy-host: ${OPENAI_PROXY_HOST:}
    proxy-port: ${OPENAI_PROXY_PORT:0}
    connect-timeout-seconds: 10
    read-timeout-seconds: 90
