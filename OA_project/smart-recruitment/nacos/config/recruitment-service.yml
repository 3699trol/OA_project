server:
  port: ${RECRUITMENT_SERVICE_PORT:8080}
  servlet:
    context-path: /

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart_recruitment}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  elasticsearch:
    uris: http://${ES_HOST:127.0.0.1}:${ES_PORT:9200}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

ai:
  service:
    # Empty by default: Feign resolves recruitment-ai-service through Nacos.
    # Set AI_SERVICE_URL only when a direct URL is deliberately required.
    url: "${AI_SERVICE_URL:}"

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}
  max-size: ${FILE_MAX_SIZE:10485760}

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

recruitment:
  config-center:
    service-loaded: recruitment-service
  auth:
    # These business values refresh without restarting recruitment-service.
    user-cache-ttl: 30m
    login-failure-window: 10m
    max-login-failures: 5
